name: Merge PR 31

on:
  push:
    branches:
      - "copilot/mark-pr-31-ready-for-review-again"

jobs:
  merge-pr-31:
    name: Mark PR 31 ready and merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Mark PR #31 ready for review and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr ready 31 --repo DivineDesign333/Github-Dashboard-
          gh pr merge 31 --repo DivineDesign333/Github-Dashboard- --merge --admin
          MERGE_SHA=$(gh pr view 31 --repo DivineDesign333/Github-Dashboard- --json mergeCommit --jq '.mergeCommit.oid')
          echo "Merge commit SHA: $MERGE_SHA"
